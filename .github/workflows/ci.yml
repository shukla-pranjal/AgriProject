name: Project CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  # ======================================================
  # BACKEND TESTS (Parallel Matrix for All Services)
  # ======================================================
  backend-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/farmflow
          - backend/eureka
          - backend/api-gateway

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      working-directory: ${{ matrix.service }}
      # -B: Batch mode (no colors/interactive)
      run: mvn -B test

  # ======================================================
  # FRONTEND CHECKS (Lint & Build)
  # ======================================================
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint Code
      run: |
        cd frontend
        npm run lint

    - name: Verify Build
      run: |
        cd frontend
        npm run build
