spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route to FarmFlow service (AGRI-JAVA)
        - id: farmflow-service
          uri: lb://AGRI-JAVA
          predicates:
            - Path=/api/**
          filters:
            - AddRequestHeader=X-Gateway-Request, gateway-secret-key-12345
      
      # Global CORS Configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      
      # Enable discovery locator for dynamic routing
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# Server Configuration
server:
  port: 8080

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
