<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
        .container { background: #fff; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        .header { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .code { font-size: 20px; font-weight: bold; color: #2c3e50; margin: 15px 0; }
        .footer { font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">Hello <span th:text="${name}">User</span>,</div>

    <p>We received a request to reset your password. Use the code below to reset it:</p>

    <div class="code" th:text="${resetCode}">RESET123</div>

    <p>If you didn’t request this, please ignore this email or contact our support team.</p>

    <div class="footer">
        &copy; <span th:text="${currentYear}">2025</span> Your Company.
        For help, contact <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}">support@yourdomain.com</a>.
    </div>
</div>
</body>
</html>
