version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: agri_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "09072005"
      MYSQL_DATABASE: "agri"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agri-network

  eureka:
    build: ./backend/eureka
    container_name: agri_eureka
    restart: always
    ports:
      - "8761:8761"
    networks:
      - agri-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend/farmflow
    container_name: agri_backend
    restart: always
    depends_on:
      - mysql
      - eureka
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agri
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "09072005"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    ports:
      - "8080:8080"
    networks:
      - agri-network

  ml:
    build: ./ml
    container_name: agri_ml
    restart: always
    ports:
      - "5000:5000"
    networks:
      - agri-network

volumes:
  mysql_data:

networks:
  agri-network:
    driver: bridge
