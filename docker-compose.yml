version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agri_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "09072005"
      MYSQL_DATABASE: "agri"

    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agri-network

  eureka:
    build: ./backend/eureka
    container_name: agri_eureka
    restart: always
    ports:
      - "8761:8761"
    networks:
      - agri-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./backend/api-gateway
    container_name: agri_gateway
    restart: always
    depends_on:
      eureka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8080
    networks:
      - agri-network

  backend:
    build: ./backend/farmflow
    container_name: agri_backend
    restart: always
    depends_on:
      mysql:
        condition: service_started
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agri
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "09072005"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - agri-network

  ml:
    build: ./ml
    container_name: agri_ml
    restart: always
    environment:
      EUREKA_SERVER: http://eureka:8761/eureka
    ports:
      - "5000:5000"
    networks:
      - agri-network

  frontend:
    build: ./frontend
    container_name: agri_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - agri-network

volumes:
  mysql_data:

networks:
  agri-network:
    driver: bridge
