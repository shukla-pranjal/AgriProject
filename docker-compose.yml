version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: agri_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "09072005"
      MYSQL_DATABASE: "agri"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  agriproject_java:
    image: pranjalkumar09/agriproject_java:latest
    container_name: agriproject_java
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agri
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "09072005"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

  agriproject_ml:
    image: pranjalkumar09/agriproject_ml:latest
    container_name: agriproject_ml
    restart: always
    ports:
      - "5000:5000"

volumes:
  mysql_data:
